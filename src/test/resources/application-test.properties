spring.application.name=Springboot-API-REST

# Base de datos en memoria H2, exclusiva para el contexto de test.
# Evita depender de las variables de entorno de RDS (DB_ENDPOINT, DB_PORT, etc.)
spring.datasource.url=jdbc:h2:mem:despachos_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

springdoc.swagger-ui.path=/swagger-ui.html