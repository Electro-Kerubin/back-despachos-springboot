name: CI/CD - Despachos Backend

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  IMAGE_NAME: rodribaeza/despacho-backend
  DEPLOYMENT_NAME: despacho-backend
  NAMESPACE: default

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar tests (perfil test / H2)
        run: mvn -B test

      - name: Compilar y empaquetar (skip tests, ya corrieron)
        run: mvn -B package -DskipTests

      - name: Subir jar como artifact
        uses: actions/upload-artifact@v4
        with:
          name: despacho-backend-jar
          path: target/*.jar
          retention-days: 5

  build-and-push:
    name: Build & Push imagen Docker
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Generar tag corto (trazabilidad)
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: Smoke Test en EC2 (docker-compose)
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Copiar docker-compose.yml al bastion
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST_BACK }}
          username: ${{ secrets.BASTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.HOST_FRONT }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/smoke-test/despacho-backend"

      - name: Levantar contenedor y validar salud
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST_BACK }}
          username: ${{ secrets.BASTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.HOST_FRONT }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/smoke-test/despacho-backend
            export IMAGE_NAME=${{ env.IMAGE_NAME }}
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            docker compose pull
            docker compose up -d
            echo "Esperando arranque del contenedor..."
            sleep 20
            # Ajusta el puerto/endpoint según el Dockerfile/application.properties definitivos
            if curl -sf http://localhost:8081/v3/api-docs > /dev/null; then
              echo "Smoke test OK: la API responde"
            else
              echo "Smoke test FALLÓ, logs del contenedor:"
              docker compose logs
              docker compose down
              exit 1
            fi
            docker compose down

  deploy-eks:
    name: Deploy a EKS (vía bastion SSH)
    needs: [build-and-push, smoke-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Copiar manifiestos k8s/ al bastion
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST_BACK }}
          username: ${{ secrets.BASTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.HOST_FRONT }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "k8s/*"
          target: "~/deploy/despacho-backend"
          strip_components: 1

      - name: Aplicar manifiestos y actualizar imagen vía SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST_BACK }}
          username: ${{ secrets.BASTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.HOST_FRONT }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: NAMESPACE,DEPLOYMENT_NAME,IMAGE_NAME
          script: |
            set -e
            aws eks update-kubeconfig --name "${{ secrets.EKS_CLUSTER_NAME }}" --region "${{ secrets.AWS_REGION }}"
            kubectl apply -f ~/deploy/despacho-backend -n ${{ env.NAMESPACE }}
            kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
              ${{ env.DEPLOYMENT_NAME }}=${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }} \
              -n ${{ env.NAMESPACE }}
            kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }} --timeout=180s